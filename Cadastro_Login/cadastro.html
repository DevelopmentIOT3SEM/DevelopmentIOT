<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <title>Cadastro</title>
</head>
<body>
    <div class="container"> 
        <div class="wrapper">
            <img src="../Home/Images/logo.png" width="200px">
            <h1 style="text-align: center; color: #004aad;">Cadastro</h1>
            <div class="input_box">
                <input type="text" id="prim_nome" placeholder="Primeiro Nome">
            </div>
            <div class="input_box">
                <input type="text" id="ult_nome" placeholder="Último Nome">
            </div>
            <div class="input_box">
                <input type="email" id="email" placeholder="Endereço de Email">
            </div>
            <div class="input_box">
                <input type="password" id="senha" placeholder="Senha">
            </div>
            <button id="cadastrar" style="font-size: 16px;">Cadastrar</button>
            <div class="sla">
                <p>Já possui login?</p> <a href="login.html">Login</a>
            </div>
        </div>
    </div>
    <script src="cadastro.js"></script>
</body>
</html>
