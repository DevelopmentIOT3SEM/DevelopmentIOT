<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <title>Login</title>
</head>
<body>
    <div class="container"> 
        <div class="wrapper">
            <img src="../Home/Images/logo.png" width="200px">
            <h1 style="text-align: center; color: #004aad;">Login</h1>
            <div class="input_box">
                <input type="email" id="email" placeholder="Endereço de Email">
            </div>
            <div class="input_box">
                <input type="password" id="senha" placeholder="Senha">
            </div>
            <button id="login" style="font-size: 16px;">Fazer login</button>
            <div class="sla">
                <p>Não possui login?</p> <a href="cadastro.html" style="color: #004aad;">Cadastro</a>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
