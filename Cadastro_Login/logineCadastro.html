<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap" rel="stylesheet">
    
    <title>Form</title>
</head>
<body>
    <section class="containerPrincipal">
        <div class=" card cadastroActive">
            <div class="esquerda">
                <div class="formLogin">
                    <img src="logoo2.png" class="logo">
                    <h2 id="entrar">Fazer Login</h2>
                    <form>
                        <input type="email" name="email" placeholder="Email">
                        <input type="password" name="password" placeholder="Senha">
                        <button type="submit">Entrar</button>
                    </form>
                </div>

                <div class="fazerLogin">
                    <h2 id="login">Já tem <br> uma conta?</h2>
                    <button class="btnFacaLogin">Faça Login</button>
                </div>
            </div>

            <div class="direita">
                <div class="formCadastro">
                    <img src="logoo2.png" class="logo">
                    <h2 id="entrar">Cadastro</h2>
                    <form>
                        <input type="text" name="nome" placeholder="Nome">
                        <input type="email" name="email" placeholder="Email">
                        <input type="password" name="password" placeholder="Senha">
                        <input type="password" name="password" placeholder="Confirme sua senha">
                        <button type="submit">Cadastrar</button>
                    </form>
                </div>

                <div class="naotemCadastro">
                    <h2 id="login">Não tem <br>uma conta?</h2>
                    <button class="cadastreSe">Cadastre-se</button>
                </div>
            </div>
        </div>
    </section>
       
    <script src="cadastro.js" defer></script>
</body>
</html>
