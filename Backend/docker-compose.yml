services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-pecasdb}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Cria as tabelas e seeds na primeira subida do banco (volume vazio).
      - ../Codigo_SQL/tabelas.sql:/docker-entrypoint-initdb.d/01-tabelas.sql:ro

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5052:80"
    depends_on:
      - postgres

  nodered:
    image: nodered/node-red
    container_name: nodered
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
    depends_on:
      - postgres

  backend:
    build:
      context: .
    container_name: pecas_api
    restart: always
    ports:
      - "5271:8080"
    depends_on:
      - postgres
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-pecasdb};Username=${POSTGRES_USER:-admin};Password=${POSTGRES_PASSWORD:-admin}
      - Jwt__Secret=${JWT_SECRET:?defina JWT_SECRET no arquivo .env}
      - Cors__Origins__0=${WEB_ORIGIN:-http://localhost:5173}
      - Cors__Origins__1=http://localhost:8081

  chatbot:
    build:
      context: ../Chatbot
    container_name: chatbot
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - backend
    environment:
      - API_BASE_URL=http://backend:8080/api
      - CORS_ORIGINS=http://localhost:5173,http://localhost:8081

volumes:
  postgres_data:
  nodered_data:
